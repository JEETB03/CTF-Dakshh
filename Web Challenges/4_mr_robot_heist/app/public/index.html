<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>E Corp Secure Document Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #58a6ff;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 20px;
        }

        .logo span {
            color: #f85149;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .file-item {
            padding: 10px 15px;
            margin-bottom: 8px;
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-item:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        .file-item.active {
            background-color: #1f6feb;
            border-color: #388bfd;
            color: white;
        }

        .main-content {
            flex-grow: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #30363d;
        }

        .path-display {
            background: #0d1117;
            padding: 8px 15px;
            border-radius: 4px;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.9rem;
            width: 100%;
        }

        .document-viewer {
            flex-grow: 1;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .loader {
            display: none;
            color: #58a6ff;
            margin-bottom: 10px;
        }

        .error {
            color: #f85149;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">E<span>Corp</span> Archive v2.1</div>
        <p style="font-size: 0.8rem; color: #8b949e; margin-bottom: 15px;">AUTHORIZED FILES ONLY</p>
        <ul class="file-list" id="file-list">
            <li class="file-item" onclick="loadFile('memo_501.txt')">📄 memo_501.txt</li>
            <li class="file-item" onclick="loadFile('financials_Q2.txt')">📄 financials_Q2.txt</li>
            <li class="file-item" onclick="loadFile('fsociety_note.txt')"
                style="color:#d2a8ff; border-color:#d2a8ff44;">📄 fsociety_note.txt</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="path-display" id="path-display">/var/www/documents/</div>
        </div>
        <div class="loader" id="loader">Retrieving document from archive...</div>
        <div class="document-viewer" id="viewer">
            Select a document from the left panel to begin.
        </div>
    </div>

    <script>
        document.querySelectorAll('.file-item').forEach(item => {
            item.addEventListener('click', function () {
                document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        async function loadFile(filename) {
            const viewer = document.getElementById('viewer');
            const loader = document.getElementById('loader');
            const pathDisplay = document.getElementById('path-display');

            viewer.innerText = '';
            loader.style.display = 'block';
            pathDisplay.innerText = 'Resolving path...';

            try {
                // The frontend explicitly removes the .txt extension before sending it
                // because the backend implicitly appends it.
                const cleanName = filename.replace('.txt', '');

                const res = await fetch(`/api/read?file=${encodeURIComponent(cleanName)}`);
                const data = await res.json();

                loader.style.display = 'none';

                if (res.ok && data.success) {
                    viewer.innerText = data.content;
                    pathDisplay.innerText = data.path;
                } else {
                    viewer.innerHTML = `<span class="error">[CRITICAL INCIDENT] Access Denied: ${data.error}</span>`;
                    pathDisplay.innerText = 'PATH_RESOLUTION_FAILED';
                }
            } catch (e) {
                loader.style.display = 'none';
                viewer.innerHTML = `<span class="error">Network breakdown transferring secure file.</span>`;
            }
        }
    </script>
</body>

</html>
