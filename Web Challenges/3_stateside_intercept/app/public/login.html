<!DOCTYPE html>
<html>

<head>
    <title>Stateside Radio Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0d0d0d;
            color: #fff;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: radial-gradient(circle at 15% 50%, rgba(29, 185, 84, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(29, 185, 84, 0.05), transparent 25%);
        }

        .login-box {
            background-color: #121212;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #1DB954;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.4);
        }

        h2 {
            font-weight: 800;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #b3b3b3;
            font-size: 0.9em;
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 6px;
            background: #282828;
            color: white;
            font-family: 'Outfit';
            font-size: 1em;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #1DB954;
            background: #333;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #1DB954;
            color: black;
            font-weight: 800;
            font-size: 1.1em;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #1ed760;
            transform: scale(1.02);
        }

        .error {
            color: #f15e6c;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
            display: none;
            background: rgba(241, 94, 108, 0.1);
            padding: 10px;
            border-radius: 4px;
        }

        .links {
            margin-top: 25px;
            font-size: 0.85em;
            color: #b3b3b3;
        }

        .links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            color: #1DB954;
            text-decoration: underline;
        }

        .disclaimer {
            margin-top: 50px;
            font-size: 0.7em;
            color: #555;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="logo">🎧</div>
        <h2>Log in to Stateside</h2>
        <div class="subtitle">Premium Audio Streaming</div>

        <form id="loginForm">
            <input type="text" id="username" placeholder="Email address or username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
            <div id="error-msg" class="error"></div>
        </form>

        <div class="links">
            <p>Don't have an account? <a href="#">Sign up here</a>.</p>
        </div>

        <div class="disclaimer">
            <p>"If someone's listening, they aren't listening to the music." - A.L.</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ username: u, password: p })
            });
            const data = await res.json();

            if (data.token) {
                localStorage.setItem('stateside_token', data.token);
                window.location.href = '/dashboard.html';
            } else {
                err.style.display = 'block';
                err.style.backgroundColor = 'rgba(241, 94, 108, 0.1)';
                err.style.color = '#f15e6c';
                err.innerText = data.error;
            }
        });
    </script>
</body>

</html>
