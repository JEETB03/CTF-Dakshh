<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost in the WAF | Restricted Vault Config</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #030a16;
            --panel-bg: rgba(10, 20, 40, 0.7);
            --primary: #00f0ff;
            --primary-dim: rgba(0, 240, 255, 0.2);
            --secondary: #0077ff;
            --text-main: #e0f8ff;
            --text-muted: #6b8eb3;
            --danger: #ff2a2a;
            --success: #00ff66;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(var(--primary-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--primary-dim) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.1;
            z-index: -1;
            transform: perspective(1000px) rotateX(30deg);
        }

        .container {
            width: 700px;
            max-width: 90vw;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary-dim);
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0, 119, 255, 0.15), inset 0 0 20px rgba(0, 240, 255, 0.05);
            padding: 40px;
            position: relative;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--primary-dim);
        }

        .header .subtitle {
            font-family: 'Share Tech Mono', monospace;
            color: var(--primary);
            font-size: 0.9rem;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .search-form {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-form input {
            width: 70%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--primary-dim);
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-form input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-dim);
        }

        .search-form button {
            padding: 12px 25px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-form button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-dim);
        }

        .alert-box {
            background: rgba(255, 42, 42, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            margin-bottom: 20px;
            text-shadow: 0 0 5px rgba(255, 42, 42, 0.5);
            animation: pulse-danger 2s infinite;
            text-align: left;
        }

        @keyframes pulse-danger {
            0% {
                box-shadow: 0 0 5px rgba(255, 42, 42, 0.2);
            }

            50% {
                box-shadow: 0 0 15px rgba(255, 42, 42, 0.4);
            }

            100% {
                box-shadow: 0 0 5px rgba(255, 42, 42, 0.2);
            }
        }

        .result-box {
            background: rgba(0, 240, 255, 0.05);
            border: 1px dashed var(--primary-dim);
            padding: 20px;
            margin-top: 20px;
            text-align: left;
            font-family: 'Share Tech Mono', monospace;
            word-wrap: break-word;
            position: relative;
        }

        .result-box::before {
            content: '>> FETCH_RESULT';
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--panel-bg);
            padding: 0 10px;
            color: var(--primary);
            font-size: 0.8rem;
        }

        .result-val {
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .flag-data {
            color: var(--success);
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Restricted Vault Config</h1>
            <div class="subtitle">SYS.CORE // ENTER CONFIG KEY TO READ VALUE</div>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="alert-box">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form class="search-form" method="POST">
            <input type="text" name="key" placeholder="e.g. sys_status, maintenance" required autocomplete="off">
            <button type="submit">SEARCH</button>
        </form>

        {% if result %}
        <div class="result-box">
            <span class="result-val {% if 'DAKSHH{' in result[0] %}flag-data{% endif %}">{{ result[0] }}</span>
        </div>
        {% endif %}
    </div>
</body>

</html>
