<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAKSHH CTF — Venom Echo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Fira Code', monospace;
            background-color: #0a0a0a;
            color: #00ff41;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0,255,65,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0,255,65,0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 420px;
            background: linear-gradient(145deg, #0d0d0d, #141414);
            border: 1px solid rgba(0,255,65,0.2);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0,255,65,0.08), 0 0 60px rgba(0,255,65,0.04), inset 0 1px 0 rgba(0,255,65,0.1);
        }

        .terminal-bar {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 24px; padding: 8px 12px;
            background: #0a0a0a; border-radius: 6px 6px 0 0;
            border-bottom: 1px solid rgba(0,255,65,0.1);
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-r { background: #ff5f57; } .dot-y { background: #ffbd2e; } .dot-g { background: #28c840; }

        .logo-icon { text-align: center; font-size: 40px; margin-bottom: 8px; filter: drop-shadow(0 0 10px rgba(0,255,65,0.5)); }

        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 1.3rem;
            text-align: center; color: #00ff41;
            text-shadow: 0 0 15px rgba(0,255,65,0.4);
            margin-bottom: 6px; letter-spacing: 2px;
        }

        .subtitle { text-align: center; color: #3a7a3a; font-size: 0.72rem; margin-bottom: 24px; letter-spacing: 1px; }
        @keyframes glow-pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
        .status-dot { display:inline-block; width:6px; height:6px; background:#00ff41; border-radius:50%; margin-right:6px; animation:glow-pulse 2s infinite; box-shadow:0 0 6px #00ff41; }

        .tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid rgba(0,255,65,0.15); }
        .tab-btn {
            flex: 1; padding: 10px; background: none; border: none; border-bottom: 2px solid transparent;
            color: #3a7a3a; font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
            letter-spacing: 2px; cursor: pointer; transition: all 0.3s;
        }
        .tab-btn.active, .tab-btn:hover { color: #00ff41; border-bottom-color: #00ff41; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .info-msg {
            background: rgba(0,255,65,0.08); border: 1px solid rgba(0,255,65,0.2);
            border-radius: 6px; padding: 10px 14px; margin-bottom: 16px;
            font-size: 0.78rem; color: #00ff41; text-align: center;
        }

        .input-group { position: relative; margin-bottom: 18px; }
        .input-group label {
            display: block; font-size: 0.68rem; color: #3a7a3a;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px;
        }
        .input-group input {
            width: 100%; padding: 11px 14px;
            background: rgba(0,255,65,0.04); border: 1px solid rgba(0,255,65,0.15);
            border-radius: 6px; color: #00ff41; font-family: 'Fira Code', monospace;
            font-size: 0.85rem; outline: none; transition: all 0.3s;
        }
        .input-group input:focus { border-color: #00ff41; box-shadow: 0 0 15px rgba(0,255,65,0.15); background: rgba(0,255,65,0.06); }
        .input-group input::placeholder { color: #2a5a2a; }

        .btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #00cc33, #00ff41);
            border: none; border-radius: 6px; color: #0a0a0a;
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
            font-weight: 700; letter-spacing: 2px; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase; margin-top: 5px;
        }
        .btn:hover { background: linear-gradient(135deg, #00ff41, #33ff66); box-shadow: 0 0 25px rgba(0,255,65,0.35); transform: translateY(-1px); }

        .footer { text-align: center; margin-top: 24px; padding-top: 14px; border-top: 1px solid rgba(0,255,65,0.08); color: #1a3a1a; font-size: 0.6rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <div class="terminal-bar">
            <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
        </div>
        <div class="logo-icon">🕷️</div>
        <h1>Venom Echo</h1>
        <p class="subtitle"><span class="status-dot"></span>DAKSHH CTF Portal v2.6</p>

        {% if info %}
        <div class="info-msg">{{ info }}</div>
        {% endif %}

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('signup')">Signup</button>
        </div>

        <div id="login" class="tab-content active">
            <form action="/login" method="POST">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="username" placeholder="Enter email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn">Authenticate</button>
            </form>
        </div>

        <div id="signup" class="tab-content">
            <form action="/signup" method="POST">
                <div class="input-group">
                    <label>Email</label>
                    <input type="text" name="susername" placeholder="Enter email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="spassword" placeholder="Enter password" required>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" name="spassword2" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>

        <div class="footer">DAKSHH CTF &bull; Secure Systems Division</div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
