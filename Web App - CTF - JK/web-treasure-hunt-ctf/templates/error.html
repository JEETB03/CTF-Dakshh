{% extends "base.html" %}

{% block content %}
<div class="center">
    <h1 style="color: var(--danger); text-shadow: 0 0 10px rgba(255,42,42,0.5);">[ {{ error_title }} ]</h1>
    <p>{{ error_msg }}</p>
    <br>
    {% if back_url %}
    <a href="{{ back_url }}" style="border: 1px solid var(--neon); padding: 10px 20px; border-radius: 4px;">RETURN TO
        PREVIOUS SECURE PORTAL</a>
    {% endif %}
</div>
{% endblock %}
