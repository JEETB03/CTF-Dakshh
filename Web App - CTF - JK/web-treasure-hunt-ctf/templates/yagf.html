{% extends "base.html" %}

{% block content %}
<div class="center">
    <h2>[ ADMIN AUTHENTICATION ]</h2>
    <p>Enter encrypted credentials to proceed.</p>
    <br>

    <form action="/validate" method="post">
        <div>
            <label style="color: var(--text-muted); font-family: 'Share Tech Mono';">USERNAME</label><br>
            <input type="text" name="usr" required autocomplete="off">
        </div>
        <div>
            <label style="color: var(--text-muted); font-family: 'Share Tech Mono';">PASSWORD</label><br>
            <input type="password" name="pwd" required>
        </div>
        <button type="submit">AUTHENTICATE</button>
    </form>
</div>
{% endblock %}
