name: "Poisoned Intelligence"
author: "Antigravity"
category: Misc
description: |
  **Story**
  A security company trained an AI model to detect **malicious commands issued to autonomous drones**.
  
  Recently, drones started executing **dangerous commands** that should have been blocked.
  Investigators suspect someone **poisoned the training data** before the model was deployed.
  
  Your task:
  Find the poisoned entries in the dataset and uncover the hidden message left by the attacker.
