description: |
  **Story**
  A long-dead reconnaissance satellite suddenly transmitted a **short distress signal** before shutting down again.
  
  The signal was intercepted by ground stations, but engineers say the transmission looks like **very old communication technology**.
  
  Some interns think it’s **Morse code**.
  
  Decode the signal and recover the hidden message before the satellite drifts out of range.
  
